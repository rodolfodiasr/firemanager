<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />

    <!-- PWA Manifest -->
    <link rel="manifest" href="/manifest.json" />

    <!-- Tema e cores -->
    <meta name="theme-color" content="#c1121f" />
    <meta name="msapplication-TileColor" content="#c1121f" />

    <!-- Ícone padrão -->
    <link rel="icon" type="image/svg+xml" href="/icons/icon.svg" />

    <!-- iOS / Safari: habilita modo app (standalone) -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="SecOps" />
    <link rel="apple-touch-icon" href="/icons/icon.svg" />

    <!-- Android Chrome: splash screen -->
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="application-name" content="SecOps" />

    <!-- SEO / compartilhamento (uso interno) -->
    <meta name="description" content="Plataforma de operação de infraestrutura de segurança com IA" />
    <meta name="robots" content="noindex, nofollow" />

    <title>SecOps — Infraestrutura com IA</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
