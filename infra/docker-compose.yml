networks:
  # public-net: only nginx + frontend (no backend services)
  public-net:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/24
  # api-net: api + celery + workers (no direct DB access from public)
  api-net:
    driver: bridge
    internal: true
    ipam:
      config:
        - subnet: 172.25.1.0/24
  # data-net: postgres + redis only (most restricted — no external access)
  data-net:
    driver: bridge
    internal: true
    ipam:
      config:
        - subnet: 172.25.2.0/24
  # internal-net: kept for legacy compatibility (bridge to api-net services)
  internal-net:
    driver: bridge
    internal: true

services:
  postgres:
    image: pgvector/pgvector:pg15
    environment:
      POSTGRES_USER: fm_user
      POSTGRES_PASSWORD: fm_pass
      POSTGRES_DB: firemanager
    # Accessible only from data-net (api reads via api-net→data-net bridge on api container)
    networks:
      - data-net
      - internal-net
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fm_user -d firemanager"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7.2-alpine
    # Accessible only from data-net
    networks:
      - data-net
      - internal-net
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ../backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - ../.env
    environment:
      DATABASE_URL: postgresql+asyncpg://fm_user:fm_pass@postgres:5432/firemanager
      REDIS_URL: redis://redis:6379/0
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - public-net
      - api-net
      - data-net
      - internal-net
    volumes:
      - ../backend:/app
      - ../scripts:/app/scripts
      - /tmp/firemanager_docs:/tmp/firemanager_docs
    dns:
      - 8.8.8.8
      - 8.8.4.4
      - 1.1.1.1
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  celery_worker:
    build:
      context: ../backend
      dockerfile: Dockerfile
    env_file:
      - ../.env
    environment:
      DATABASE_URL: postgresql+asyncpg://fm_user:fm_pass@postgres:5432/firemanager
      REDIS_URL: redis://redis:6379/0
    depends_on:
      - api
    networks:
      - api-net
      - data-net
      - internal-net
    volumes:
      - ../backend:/app
      - ../scripts:/app/scripts
      - /tmp/firemanager_docs:/tmp/firemanager_docs
    dns:
      - 8.8.8.8
      - 8.8.4.4
      - 1.1.1.1
    command: celery -A app.workers.celery_app worker --loglevel=info

  celery_beat:
    build:
      context: ../backend
      dockerfile: Dockerfile
    env_file:
      - ../.env
    environment:
      DATABASE_URL: postgresql+asyncpg://fm_user:fm_pass@postgres:5432/firemanager
      REDIS_URL: redis://redis:6379/0
    depends_on:
      - api
    networks:
      - internal-net
    volumes:
      - ../backend:/app
    command: celery -A app.workers.celery_app beat --loglevel=info

  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
    ports:
      - "3000:80"
    networks:
      - public-net
    depends_on:
      - api

  frontend-staging:
    build:
      context: ../frontend
      dockerfile: Dockerfile.staging
      args:
        VITE_STAGING: "true"
    ports:
      - "3002:80"
    networks:
      - public-net
    depends_on:
      - api
    profiles:
      - staging

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "8080:8080"
      - "4000:4000"   # Plataforma RH
    networks:
      - public-net
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - api
      - frontend

  prometheus:
    image: prom/prometheus:latest
    networks:
      - internal-net
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
    ports:
      - "9090:9090"

  grafana:
    image: grafana/grafana:latest
    ports:
      - "3001:3000"
    networks:
      - internal-net
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin
    volumes:
      - grafana_data:/var/lib/grafana

volumes:
  postgres_data:
  redis_data:
  grafana_data:
