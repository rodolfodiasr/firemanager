# ── Cabeçalhos comuns (reutilizados nos dois server blocks) ───────────────────
map $host $dummy { default ""; }  # trick para forçar o map a ser parseado

# ── PRODUÇÃO — porta 80 ───────────────────────────────────────────────────────
server {
    listen 80;
    server_name _;

    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

    # AI-heavy endpoints (SSH collection + Claude API can take ~90s)
    location ~ ^/api/(compliance|remediation) {
        rewrite ^/api/(.*) /$1 break;
        proxy_pass http://api:8000;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
        proxy_connect_timeout 10s;
    }

    # All other API endpoints
    location /api/ {
        proxy_pass http://api:8000/;
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
        proxy_connect_timeout 10s;
    }

    location / {
        proxy_pass http://frontend:80/;
    }
}

# ── PLATAFORMA RH — porta 4000 ───────────────────────────────────────────────
server {
    listen 4000;
    server_name _;

    resolver 127.0.0.11 valid=30s ipv6=off;
    set $plataforma_rh_upstream http://plataforma-rh:3000;

    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # Next.js — SSE / long-poll (tRPC subscriptions)
    proxy_read_timeout 120s;
    proxy_send_timeout 120s;
    proxy_connect_timeout 10s;

    # Static assets do Next.js (cache agressivo)
    location /_next/static/ {
        proxy_pass $plataforma_rh_upstream;
        proxy_cache_valid 200 1y;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    location / {
        proxy_pass $plataforma_rh_upstream;
    }
}

# ── HOMOLOGAÇÃO — porta 8080 ──────────────────────────────────────────────────
server {
    listen 8080;
    server_name _;

    resolver 127.0.0.11 valid=30s ipv6=off;
    set $frontend_staging_upstream http://frontend-staging:80;

    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

    # Mesmo timeout estendido para endpoints pesados
    location ~ ^/api/(compliance|remediation) {
        rewrite ^/api/(.*) /$1 break;
        proxy_pass http://api:8000;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
        proxy_connect_timeout 10s;
    }

    # API compartilhada com produção
    location /api/ {
        proxy_pass http://api:8000/;
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
        proxy_connect_timeout 10s;
    }

    # Frontend de homologação
    location / {
        proxy_pass $frontend_staging_upstream;
    }
}
