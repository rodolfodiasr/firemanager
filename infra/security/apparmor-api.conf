#include <tunables/global>

profile firemanager-api flags=(attach_disconnected,mediate_deleted) {
  #include <abstractions/base>
  #include <abstractions/python>
  #include <abstractions/nameservice>
  #include <abstractions/openssl>

  # Allow network
  network inet stream,
  network inet6 stream,
  network inet dgram,

  # Deny raw sockets (prevent port scanning from inside the container)
  deny network raw,
  deny network packet,

  # Allow read access to app code
  /app/** r,
  /app/**.py r,
  /usr/local/lib/python3.*/** r,
  /usr/local/bin/python* ix,
  /usr/local/bin/uvicorn ix,

  # Temp and logs
  /tmp/** rw,
  /var/log/** w,

  # Deny writes to app code (read-only app)
  deny /app/** w,

  # Deny access to host filesystem
  deny /etc/shadow r,
  deny /etc/passwd w,
  deny /root/** rw,
  deny /home/** rw,

  # Allow /proc for health checks
  /proc/*/status r,
  /proc/*/net/if_inet6 r,
}
