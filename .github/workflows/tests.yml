name: Tests

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  PYTHON_VERSION: "3.12"
  NODE_VERSION: "20"

jobs:
  # ── Camada 1+2: Backend unit + integration tests ──────────────────────────
  backend-tests:
    name: Backend Tests (pytest)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install backend dependencies
        working-directory: backend
        run: pip install -r requirements.txt

      - name: Install test dependencies
        working-directory: backend
        run: pip install pytest pytest-asyncio pytest-httpx httpx aiosqlite

      - name: Run unit tests
        working-directory: backend
        env:
          SECRET_KEY: "ci-test-secret-key-not-for-production"
          DATABASE_URL: "sqlite+aiosqlite:///:memory:"
          ANTHROPIC_API_KEY: "sk-ant-ci-placeholder"
        run: pytest tests/unit/ -v --tb=short

      - name: Run integration tests
        working-directory: backend
        env:
          SECRET_KEY: "ci-test-secret-key-not-for-production"
          DATABASE_URL: "sqlite+aiosqlite:///:memory:"
          ANTHROPIC_API_KEY: "sk-ant-ci-placeholder"
        run: pytest tests/integration/ -v --tb=short

      - name: Run security tests
        working-directory: backend
        env:
          SECRET_KEY: "ci-test-secret-key-not-for-production"
          DATABASE_URL: "sqlite+aiosqlite:///:memory:"
          ANTHROPIC_API_KEY: "sk-ant-ci-placeholder"
        run: pytest tests/security/ -v --tb=short

  # ── Frontend typecheck ────────────────────────────────────────────────────
  frontend-typecheck:
    name: Frontend TypeCheck
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: TypeScript check
        working-directory: frontend
        run: npm run typecheck

  # ── Camada 3: Playwright E2E ──────────────────────────────────────────────
  e2e-tests:
    name: E2E Tests (Playwright)
    runs-on: ubuntu-latest
    needs: [frontend-typecheck]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Install Playwright browsers
        working-directory: frontend
        run: npx playwright install --with-deps chromium

      - name: Build frontend
        working-directory: frontend
        env:
          VITE_API_URL: http://localhost:8000
        run: npm run build

      - name: Serve frontend build and run E2E
        working-directory: frontend
        env:
          BASE_URL: http://localhost:4173
        run: |
          npx vite preview --port 4173 &
          sleep 3
          npm run e2e

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: frontend/playwright-report/
          retention-days: 7
