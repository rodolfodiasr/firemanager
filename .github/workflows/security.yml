name: Security Scan

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  schedule:
    - cron: "0 3 * * 1"   # toda segunda-feira às 03h UTC

jobs:
  sast:
    name: SAST & Dependency Audit
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # truffleHog precisa do histórico completo

      # ── Python setup ──────────────────────────────────────────────────────
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install audit tools
        run: pip install bandit pip-audit

      # ── Bandit — Python SAST ──────────────────────────────────────────────
      - name: Bandit SAST scan
        run: |
          bandit -r backend/app \
            --severity-level medium \
            --confidence-level medium \
            --format json \
            --output bandit-report.json \
            --exit-zero
          # Surface findings but do not block on warnings; only block on HIGH
          bandit -r backend/app \
            --severity-level high \
            --confidence-level high

      - name: Upload Bandit report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bandit-report
          path: bandit-report.json

      # ── pip-audit — dependency CVE check ──────────────────────────────────
      - name: pip-audit
        run: |
          pip-audit \
            --requirement backend/requirements.txt \
            --format json \
            --output pip-audit-report.json \
            --no-deps \
            --ignore-vuln GHSA-8495-4g3g-x7pr || true   # known false-positive placeholder
          pip-audit \
            --requirement backend/requirements.txt \
            --no-deps \
            --severity critical

      - name: Upload pip-audit report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pip-audit-report
          path: pip-audit-report.json

      # ── truffleHog — secret scanning ─────────────────────────────────────
      - name: truffleHog secret scan
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          base: ${{ github.event.repository.default_branch }}
          head: HEAD
          extra_args: --only-verified

  container-scan:
    name: Container Image Scan (Trivy)
    runs-on: ubuntu-latest
    needs: sast

    steps:
      - uses: actions/checkout@v4

      - name: Build backend image
        run: docker build -t eternity-api:scan backend/

      - name: Trivy vulnerability scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: eternity-api:scan
          format: table
          exit-code: "1"
          ignore-unfixed: true
          vuln-type: os,library
          severity: CRITICAL,HIGH

      - name: Trivy SARIF upload
        if: always()
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: eternity-api:scan
          format: sarif
          output: trivy-results.sarif

      - name: Upload Trivy SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-results.sarif
